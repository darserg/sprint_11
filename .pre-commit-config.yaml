default_language_version:
  python: python3
  repos:
  - repo: local
    hooks:
      - id: pycodestyle
        name: pycodestyle
        entry: pycodestyle
        language: python
        additional_dependencies: [pycodestyle==2.12.1]
        args: [--max-line-length=88]
        files: ^backend/.*\.py$
        exclude: ^backend/.*/migrations/
